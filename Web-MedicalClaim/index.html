<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - getMedic.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="utils/db.js"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans text-slate-800">

    <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-2xl mb-4 shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-notes-medical text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">getMedic<span class="text-blue-600">.</span></h1>
            <p class="text-slate-500 mt-1.5 text-sm font-medium">Employee Health Benefits Portal</p>
        </div>

        <div id="loginAlert" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm font-semibold text-center">
            Invalid Employee ID or Password!
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Employee ID</label>
                <input type="text" id="empId" value="EMP-18431" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                <input type="password" id="empPass" value="password123" class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" required>
            </div>

            <div class="p-3 bg-slate-50 border border-slate-200 rounded-lg mt-4 text-xs text-slate-500 font-medium">
                <p class="mb-1"><strong class="text-slate-700">Demo Accounts:</strong></p>
                <p>EMP: <span class="text-blue-600 font-bold">EMP-18431</span> | MGR: <span class="text-purple-600 font-bold">MGR-2041</span></p>
                <p>FIN: <span class="text-amber-600 font-bold">FIN-5050</span> | ADM: <span class="text-emerald-600 font-bold">ADM-9999</span></p>
                <p class="mt-1 text-slate-400">Password for all users: <span class="text-slate-600 font-mono">password123</span> (except Admin:<span class="text-slate-600 font-mono"> admin</span>)</p>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition shadow-md hover:shadow-lg mt-4">
                Sign In
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const idInput = document.getElementById('empId').value;
            const passInput = document.getElementById('empPass').value;
            const users = JSON.parse(localStorage.getItem('medic_users'));
            const alertBox = document.getElementById('loginAlert');

            const validUser = users.find(u => u.id === idInput && u.password === passInput);

            if (validUser) {
                localStorage.setItem('medic_session', JSON.stringify({
                    id: validUser.id,
                    name: validUser.name,
                    role: validUser.role,
                    dept: validUser.dept,
                    avatar: validUser.avatar
                }));
                window.location.href = 'pages/dashboard.html';
            } else {
                alertBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
