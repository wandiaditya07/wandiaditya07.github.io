<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payouts - getMedic.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../utils/layout.js" defer></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex h-screen overflow-hidden">

    <div id="sidebar-container" class="flex-shrink-0 z-20"></div>

    <div class="flex-1 flex flex-col min-w-0">
        <div id="topbar-container"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <div class="mb-2 flex flex-col sm:flex-row justify-between sm:items-end gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">Financial Settlements</h1>
                        <p class="text-sm text-slate-500 mt-1">Process approved claims and manage bank transfers.</p>
                    </div>
                    <button class="px-4 py-2 bg-slate-800 text-white text-sm font-bold rounded-lg shadow-sm hover:bg-slate-700 transition flex items-center">
                        <i class="fa-solid fa-file-csv mr-2"></i> Export Bank CSV
                    </button>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center h-16">
                        <h2 class="font-bold text-slate-800"><i class="fa-solid fa-building-columns mr-2 text-slate-400"></i> Pending Bank Transfers</h2>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-slate-600 whitespace-nowrap">
                            <thead class="bg-white border-b border-slate-200 text-slate-700 font-bold">
                                <tr>
                                    <th class="px-6 py-4">Employee</th>
                                    <th class="px-6 py-4">Claim ID</th>
                                    <th class="px-6 py-4">Bank Details (Destination)</th>
                                    <th class="px-6 py-4 text-right">Net Payout</th>
                                    <th class="px-6 py-4 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="payoutTableBody" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const renderPayouts = () => {
            const claims = JSON.parse(localStorage.getItem('medic_claims')) || [];
            
            // Keuangan hanya melihat data yang statusnya 'Approved'
            const approvedClaims = claims.filter(c => c.status === 'Approved');
            const tbody = document.getElementById('payoutTableBody');
            
            tbody.innerHTML = '';
            
            if(approvedClaims.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-500 font-medium"><i class="fa-solid fa-check-double text-3xl mb-3 text-slate-300 block"></i>All approved claims have been settled!</td></tr>';
                return;
            }

            approvedClaims.forEach(claim => {
                const row = `
                    <tr class="hover:bg-slate-50/80 transition">
                        <td class="px-6 py-4">
                            <p class="font-bold text-slate-900">${claim.userName}</p>
                            <p class="text-xs text-slate-500">${claim.userId}</p>
                        </td>
                        <td class="px-6 py-4 font-bold text-slate-700">${claim.id}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-building-columns"></i></div>
                                <div>
                                    <p class="font-bold text-slate-800 text-xs uppercase">Bank of America</p>
                                    <p class="text-xs font-mono text-slate-500">**** **** 4892</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right font-black text-emerald-600">$${claim.amount.toFixed(2)}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="markAsSettled('${claim.id}')" class="px-4 py-2 text-xs font-bold bg-blue-600 text-white rounded shadow-sm hover:bg-blue-700 transition">
                                Mark as Paid
                            </button>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        };

        const markAsSettled = (claimId) => {
            if(confirm(`Confirm funds transfer for claim ${claimId}? This will mark the claim as Settled.`)) {
                let claims = JSON.parse(localStorage.getItem('medic_claims')) || [];
                const claimIndex = claims.findIndex(c => c.id === claimId);
                
                if(claimIndex > -1) {
                    claims[claimIndex].status = 'Settled';
                    localStorage.setItem('medic_claims', JSON.stringify(claims));
                    renderPayouts(); 
                }
            }
        };

        document.addEventListener("DOMContentLoaded", renderPayouts);
    </script>
</body>
</html>
