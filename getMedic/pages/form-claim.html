<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File a Claim - getMedic.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../utils/layout.js" defer></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 flex h-screen overflow-hidden">

    <div id="sidebar-container" class="flex-shrink-0 z-20"></div>

    <div class="flex-1 flex flex-col min-w-0">
        <div id="topbar-container"></div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-3xl mx-auto">
                
                <div class="mb-6 flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">File a New Claim</h1>
                        <p class="text-sm text-slate-500 mt-1">Submit your medical expenses for reimbursement.</p>
                    </div>
                    <a href="dashboard.html" class="px-4 py-2 text-sm font-bold text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition shadow-sm">
                        Cancel
                    </a>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <form id="claimForm" class="p-6 sm:p-8 space-y-6">
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Expense Category <span class="text-red-500">*</span></label>
                                <select id="claimCategory" required class="...">
                                    <option value="" disabled selected>Select category...</option>
                                    <option value="Outpatient">Outpatient</option>
                                    <option value="Inpatient">Inpatient</option>
                                    <option value="Dental Care">Dental Care</option>
                                    <option value="Optical">Optical</option>
                                    <option value="Pharmacy">Pharmacy</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Date of Service <span class="text-red-500">*</span></label>
                                <input type="date" id="claimDate" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-slate-700">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Total Amount (USD) <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <span class="text-slate-500 font-bold">$</span>
                                </div>
                                <input type="number" id="claimAmount" step="0.01" min="1" required placeholder="0.00" class="w-full border border-slate-300 rounded-lg pl-8 pr-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-slate-900 font-bold">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Description / Diagnosis</label>
                            <textarea id="claimDesc" rows="3" placeholder="Briefly describe the medical issue and treatment..." class="w-full border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-slate-700"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Official Receipt / Invoice <span class="text-red-500">*</span></label>
                            
                            <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-lg hover:bg-slate-50 transition cursor-pointer group" id="dropZone" onclick="document.getElementById('fileUpload').click()">
                                <div class="space-y-1 text-center">
                                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 group-hover:text-blue-500 transition mb-2"></i>
                                    <div class="flex text-sm text-slate-600 justify-center">
                                        <span class="relative cursor-pointer bg-white rounded-md font-bold text-blue-600 hover:text-blue-500 focus-within:outline-none">
                                            <span>Upload a file</span>
                                            <input id="fileUpload" name="fileUpload" type="file" class="sr-only" accept=".pdf,.png,.jpg,.jpeg" required>
                                        </span>
                                        <p class="pl-1">or drag and drop</p>
                                    </div>
                                    <p class="text-xs text-slate-500 font-medium">PNG, JPG, PDF up to 5MB</p>
                                </div>
                            </div>

                            <div id="filePreview" class="hidden mt-3 p-3 bg-blue-50 border border-blue-100 rounded-lg flex justify-between items-center">
                                <div class="flex items-center gap-3 overflow-hidden">
                                    <i class="fa-solid fa-file-invoice text-blue-500 text-lg shrink-0"></i>
                                    <p id="fileNameDisplay" class="text-sm font-bold text-slate-700 truncate">filename.pdf</p>
                                </div>
                                <button type="button" onclick="removeFile(event)" class="text-slate-400 hover:text-red-500 transition p-1"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        </div>

                        <div class="pt-4 border-t border-slate-100 flex justify-end">
                            <button type="submit" class="px-6 py-2.5 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 transition shadow-sm flex items-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> Submit Claim
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Logika UI Upload File
        const fileInput = document.getElementById('fileUpload');
        const filePreview = document.getElementById('filePreview');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const dropZone = document.getElementById('dropZone');

        fileInput.addEventListener('change', function(e) {
            if(this.files && this.files[0]) {
                const file = this.files[0];
                fileNameDisplay.textContent = file.name;
                dropZone.classList.add('hidden');
                filePreview.classList.remove('hidden');
            }
        });

        function removeFile(e) {
            e.stopPropagation(); // Mencegah klik menembus ke dropZone
            fileInput.value = '';
            filePreview.classList.add('hidden');
            dropZone.classList.remove('hidden');
        }

        // Logika Submit Form
        document.getElementById('claimForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah halaman reload

            const sessionData = localStorage.getItem('medic_session');
            if(!sessionData) {
                alert("Session expired. Please login again.");
                return window.location.href = '../index.html';
            }
            const user = JSON.parse(sessionData);

            // Ambil Nilai dari Input
            const category = document.getElementById('claimCategory').value;
            const date = document.getElementById('claimDate').value;
            const amount = parseFloat(document.getElementById('claimAmount').value);
            const desc = document.getElementById('claimDesc').value;
            
            // Simulasi nama file dari input (Jika di sistem asli, ini adalah URL dari AWS S3)
            const fileName = fileInput.files[0] ? fileInput.files[0].name : 'No Receipt';

            // Generate ID Unik (Misal: MDC-8421)
            const randomId = Math.floor(1000 + Math.random() * 9000);
            const claimId = `MDC-${randomId}`;

            // Buat Object Klaim Baru
            const newClaim = {
                id: claimId,
                userId: user.id,
                userName: user.name,
                category: category,
                date: date,
                amount: amount,
                description: desc,
                receiptFile: fileName, // Menyimpan simulasi file
                status: 'Pending' // Status awal selalu Pending
            };

            // Simpan ke LocalStorage
            const allClaims = JSON.parse(localStorage.getItem('medic_claims')) || [];
            allClaims.unshift(newClaim); // Masukkan ke urutan paling atas
            localStorage.setItem('medic_claims', JSON.stringify(allClaims));

            // Notifikasi Sukses & Redirect
            alert(`Success! Claim ${claimId} has been submitted for adjudication.\n\nReceipt attached: ${fileName}`);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
